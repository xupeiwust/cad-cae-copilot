      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0d1117" rx="12"/>
  <text x="440" y="28" text-anchor="middle" fill="#e6edf3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="600">Four Canonical Backend Demos</text>

  <!-- Top-left: Topopt -->
  <rect x="20" y="48" width="410" height="162" fill="#1e1b2e" rx="8" stroke="#a855f7" stroke-width="1.5"/>
  <text x="40" y="70" fill="#d8b4fe" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600">1. Topology Optimization</text>
