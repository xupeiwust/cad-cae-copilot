name: Real CCX Verification

on:
  workflow_dispatch:

# Candidate required gate for #373. It is manual while the remaining NAFEMS
# reference calibration is being finished; once the real suite is green, extend
# this workflow to pull_request/push protection.
concurrency:
  group: real-ccx-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-ccx:
    name: Real CalculiX V&V gate
    runs-on: ubuntu-latest
    env:
      AIENG_CCX_CMD: ccx
    steps:
      - uses: actions/checkout@v4

      - name: Install system solver/runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            calculix-ccx \
            libegl1 \
            libgl1 \
            libglx-mesa0 \
            libgomp1 \
            libglu1-mesa \
            libsm6 \
            libxext6 \
            libxrender1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            aieng/pyproject.toml
            aieng-ui/backend/pyproject.toml

      - name: Install Python verification stack
        run: |
          python -m pip install --upgrade pip
          pip install -e ./aieng[dev]
          pip install -e ./aieng-ui/backend[dev,cad]
          pip install gmsh

      - name: Check CalculiX is on PATH
        run: command -v ccx

      - name: Run real-ccx verification gate
        run: python scripts/run_real_ccx_verification_gate.py
