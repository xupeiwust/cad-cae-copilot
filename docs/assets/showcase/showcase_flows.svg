  <line x1="632" y1="272" x2="650" y2="272" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="654" y="258" width="70" height="28" fill="#3f1d38" rx="4" stroke="#f472b6" stroke-width="1"/>
