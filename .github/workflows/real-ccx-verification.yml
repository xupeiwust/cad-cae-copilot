name: Real CCX Verification

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/real-ccx-verification.yml"
      - "scripts/run_real_ccx_verification_gate.py"
      - "aieng/src/aieng/nafems_verification.py"
      - "aieng/tests/test_nafems_verification.py"
      - "aieng/tests/fixtures/nafems/**"
      - "aieng/benchmarks/datasets/analytical_fea/**"
      - "aieng/src/aieng/simulation/**"
      - "aieng/tests/test_deck_generator.py"
      - "aieng-ui/backend/app/aieng_bridge.py"
      - "aieng-ui/backend/app/runtime_registry/cae.py"
      - "aieng-ui/backend/app/simulation_runner.py"
      - "aieng-ui/backend/tests/test_cae_solve_integration.py"
      - "aieng-ui/backend/tests/test_simulation_runner.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/real-ccx-verification.yml"
      - "scripts/run_real_ccx_verification_gate.py"
      - "aieng/src/aieng/nafems_verification.py"
      - "aieng/tests/test_nafems_verification.py"
      - "aieng/tests/fixtures/nafems/**"
      - "aieng/benchmarks/datasets/analytical_fea/**"
      - "aieng/src/aieng/simulation/**"
      - "aieng/tests/test_deck_generator.py"
      - "aieng-ui/backend/app/aieng_bridge.py"
      - "aieng-ui/backend/app/runtime_registry/cae.py"
      - "aieng-ui/backend/app/simulation_runner.py"
      - "aieng-ui/backend/tests/test_cae_solve_integration.py"
      - "aieng-ui/backend/tests/test_simulation_runner.py"

# Candidate required gate for #373. It auto-runs for solver/V&V path changes and
# remains manually runnable for release verification. Branch protection can mark
# this required once runner stability and runtime cost are acceptable.
concurrency:
  group: real-ccx-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-ccx:
    name: Real CalculiX V&V gate
    runs-on: ubuntu-latest
    env:
      AIENG_CCX_CMD: ccx
    steps:
      - uses: actions/checkout@v4

      - name: Install system solver/runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            calculix-ccx \
            libegl1 \
            libgl1 \
            libglx-mesa0 \
            libgomp1 \
            libglu1-mesa \
            libsm6 \
            libxext6 \
            libxrender1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            aieng/pyproject.toml
            aieng-ui/backend/pyproject.toml

      - name: Install Python verification stack
        run: |
          python -m pip install --upgrade pip
          pip install -e ./aieng[dev]
          pip install -e ./aieng-ui/backend[dev,cad]
          pip install gmsh

      - name: Check CalculiX is on PATH
        run: command -v ccx

      - name: Run real-ccx verification gate
        run: python scripts/run_real_ccx_verification_gate.py
