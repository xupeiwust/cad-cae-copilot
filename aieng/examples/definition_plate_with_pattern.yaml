model_id: definition_plate_with_pattern
label: Definition-sourced plate with hole-pattern probe
description: >
  Coverage-probe fixture for benchmark Phase 18C-min. This model intentionally
  focuses on stable IDs, protection rules, and evidence boundaries rather than
  geometric realism.
provenance:
  source: hand_authored_benchmark_probe
  authoring_method: deterministic_fixture
coordinate_system:
  type: cartesian
  handedness: right
  units:
    length: mm
    angle: deg
  origin: [0, 0, 0]
  axes:
    x: [1, 0, 0]
    y: [0, 1, 0]
    z: [0, 0, 1]
material:
  name: Al6061-T6
  source: typical_public_datasheet_values
  properties:
    youngs_modulus_mpa: 69000
    poisson_ratio: 0.33
    density_kg_m3: 2700
    yield_strength_mpa: 276
assumptions:
  - Plate is represented semantically; no CAD topology exists in this probe.
  - Hole pattern is the protected mounting interface.
known_limitations:
  - No imported STEP geometry.
  - No solver result evidence attached by default.
  - Feature parameters are semantic intent only.
design_requirements:
  mass_target:
    objective: reduce_mass_without_changing_mounting_interface
    target_reduction_percent: 12
    protected_feature_ids:
      - feat_hole_pattern_001
  structural_targets:
    max_von_mises_stress_mpa: 140
  protected_interfaces:
    - feat_hole_pattern_001
simulation:
  type: static_structural
  fixed:
    - feat_hole_pattern_001
  loads:
    - target: feat_load_interface_001
      type: force
      value_n: 350
      direction: [1, 0, 0]
features:
  - feature_id: feat_base_plate_001
    type: base_plate
    name: Probe base plate
    parameters:
      length_mm: 140
      width_mm: 90
      thickness_mm: 10
    intent:
      role: structural_base_candidate
      generation_hint: rectangular_plate
  - feature_id: feat_hole_pattern_001
    type: mounting_hole_pattern
    name: Protected mounting hole pattern
    parameters:
      count: 4
      diameter_mm: 10
      pitch_x_mm: 100
      pitch_y_mm: 50
      through: true
      axis: [0, 0, 1]
      hole_centers_mm:
        - [-50, -25, 0]
        - [50, -25, 0]
        - [50, 25, 0]
        - [-50, 25, 0]
    intent:
      role: mounting_interface_candidate
      generation_hint: four_through_holes
    relationships:
      - type: located_on
        source_feature_id: feat_hole_pattern_001
        target_feature_id: feat_base_plate_001
        reason: Pattern is on the plate.
  - feature_id: feat_load_interface_001
    type: interface_face
    name: Load interface candidate
    parameters:
      nominal_area_mm2: 400
      center_mm: [60, 0, 10]
      normal: [1, 0, 0]
    intent:
      role: load_application_interface
      generation_hint: semantic_load_patch
  - feature_id: feat_flange_001
    type: flange
    name: Side flange candidate
    parameters:
      diameter_mm: 42
      thickness_mm: 8
      center_mm: [0, 0, 10]
      normal: [0, 0, 1]
    intent:
      role: stiffness_improvement_candidate
      generation_hint: circular_boss_like_flange
constraints:
  - id: con_protect_holes_001
    type: protect_geometry
    target: feat_hole_pattern_001
    reason: Preserve mounting interface.
  - id: con_static_target_001
    type: simulation_target
    target: sim_static_001
    reason: Keep stress below target after modifications.
    metric: max_von_mises_stress_mpa
    operator: <=
    value: 140
