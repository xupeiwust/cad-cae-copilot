  <line x1="330" y1="96" x2="352" y2="96" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="356" y="82" width="60" height="28" fill="#14532d" rx="4" stroke="#22c55e" stroke-width="1"/>
  <text x="386" y="100" text-anchor="middle" fill="#86efac" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Writeback</text>
  <text x="40" y="128" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Boundary: 2D plane-stress; 3D experimental/reference</text>
  <text x="40" y="144" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Artifacts: topology_optimization.json, shape_ir.json</text>
