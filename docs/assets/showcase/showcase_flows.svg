  <rect x="356" y="258" width="60" height="28" fill="#3b0764" rx="4" stroke="#a855f7" stroke-width="1"/>
  <text x="386" y="276" text-anchor="middle" fill="#d8b4fe" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Topopt</text>
  <text x="40" y="304" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Boundary: Proxy connections; no contact/friction/bolt preload</text>
  <text x="40" y="320" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Artifacts: assembly_topology_optimization.json, optimized_shape_ir.json</text>
  <text x="40" y="336" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Cmd: pytest aieng-ui/backend/tests/test_assembly_topopt_demo.py -q</text>

  <!-- Bottom-right: Design Study -->
  <rect x="450" y="224" width="410" height="162" fill="#2e1a1a" rx="8" stroke="#f472b6" stroke-width="1.5"/>
  <text x="470" y="246" fill="#fbcfe8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600">4. Agent-Guided Parameter Design Study</text>
