  <rect x="260" y="258" width="70" height="28" fill="#064e3b" rx="4" stroke="#2dd4bf" stroke-width="1"/>
  <text x="295" y="276" text-anchor="middle" fill="#5eead4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Proxy CAE</text>
