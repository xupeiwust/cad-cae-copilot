name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      PYTHONPATH: ${{ github.workspace }}/src

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip uninstall -y freecad-mcp freecad_mcp aieng-freecad-mcp || true
          python -m pip install -e ".[dev]"

      - name: Health check — Python version, key deps, critical imports
        run: |
          echo "=== Python version ==="
          python --version
          echo ""
          echo "=== Key package metadata ==="
          python -m pip show aieng-freecad-mcp PyYAML pytest pydantic mcp
          echo ""
          echo "=== Critical imports ==="
          python -c "import freecad_mcp; print('OK: freecad_mcp @', freecad_mcp.__file__)"
          python -c "import yaml; print('OK: yaml', yaml.__version__)"

      - name: Run tests (no FreeCAD required)
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Error-code consistency check
        run: |
          python scripts/validate_error_code_consistency.py
