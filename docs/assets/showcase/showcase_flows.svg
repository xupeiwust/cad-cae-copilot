  <rect x="470" y="118" width="70" height="28" fill="#14532d" rx="4" stroke="#22c55e" stroke-width="1"/>
  <text x="505" y="136" text-anchor="middle" fill="#86efac" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">STEP Export</text>
  <text x="470" y="164" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Boundary: Only when shell closes; mesh-derived/lossy</text>
  <text x="470" y="180" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Artifacts: reconstructed.step, stitching_plan.json</text>
  <text x="470" y="196" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Cmd: pytest aieng/tests/test_mesh_brep_solidification.py -q</text>

  <!-- Bottom-left: Assembly-aware -->
  <rect x="20" y="224" width="410" height="162" fill="#0f1a1a" rx="8" stroke="#2dd4bf" stroke-width="1.5"/>
  <text x="40" y="246" fill="#5eead4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="12" font-weight="600">3. Assembly-Aware Topology Optimization</text>
