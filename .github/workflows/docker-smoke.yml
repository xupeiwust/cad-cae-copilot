name: Docker smoke

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "docker-compose.yml"
      - "aieng-ui/backend/scripts/docker_smoke.py"
      - ".github/workflows/docker-smoke.yml"
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker/**"
      - "docker-compose.yml"
      - "aieng-ui/backend/scripts/docker_smoke.py"
      - ".github/workflows/docker-smoke.yml"
  schedule:
    # Nightly at 05:47 UTC.
    - cron: "47 5 * * *"
  workflow_dispatch:

concurrency:
  group: docker-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-all-in-one:
    name: Build and smoke-test Docker all-in-one image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # required for the GHCR publish step (push-to-main only)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t aieng/workbench:local .

      - name: Start container
        run: |
          docker run -d \
            --name aieng-workbench-smoke \
            -p 8000:8000 \
            -p 8765:8765 \
            -v aieng-smoke-data:/data \
            aieng/workbench:local

      - name: Wait for container readiness
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' aieng-workbench-smoke 2>/dev/null || echo 'starting')
            if [ "$status" = "healthy" ]; then
              echo "Container healthy"
              exit 0
            fi
            echo "Container health: $status ($i/30)"
            sleep 2
          done
          echo "Container did not become healthy" >&2
          exit 1

      - name: Install Python client deps
        run: python -m pip install --upgrade pip "mcp>=1.0"

      - name: Run Docker smoke
        run: python aieng-ui/backend/scripts/docker_smoke.py

      - name: Create project for restart-persistence check
        run: |
          PROJECT_ID=$(python aieng-ui/backend/scripts/docker_smoke.py persist-create)
          echo "Created persistence project: $PROJECT_ID"
          echo "PERSIST_PROJECT_ID=$PROJECT_ID" >> "$GITHUB_ENV"

      - name: Restart container (same /data volume)
        run: docker restart aieng-workbench-smoke

      - name: Wait for container readiness after restart
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect --format='{{.State.Health.Status}}' aieng-workbench-smoke 2>/dev/null || echo 'starting')
            if [ "$status" = "healthy" ]; then
              echo "Container healthy after restart"
              exit 0
            fi
            echo "Container health: $status ($i/30)"
            sleep 2
          done
          echo "Container did not become healthy after restart" >&2
          exit 1

      - name: Verify project survived restart
        run: |
          python aieng-ui/backend/scripts/docker_smoke.py persist-verify \
            --project-id "$PERSIST_PROJECT_ID"

      # ── GHCR publish (alpha) ────────────────────────────────────────────────
      # Only on a push to main (and schedule / manual dispatch on main) — never
      # on pull requests. Reached only after the build + full smoke above pass,
      # so a published image is always a smoke-validated image. Auth uses the
      # built-in GITHUB_TOKEN (no extra secrets); the image is alpha-scoped and
      # not production-certified.
      - name: Log in to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image to GHCR
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${OWNER}/aieng-workbench"
          SHA_TAG="sha-$(echo "${GITHUB_SHA}" | cut -c1-12)"
          docker tag aieng/workbench:local "${IMAGE}:latest"
          docker tag aieng/workbench:local "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:latest"
          docker push "${IMAGE}:${SHA_TAG}"
          echo "Published ${IMAGE}:latest and ${IMAGE}:${SHA_TAG}"

      - name: Dump container logs on failure
        if: failure()
        run: docker logs aieng-workbench-smoke || true

      - name: Stop and remove container
        if: always()
        run: |
          docker stop aieng-workbench-smoke || true
          docker rm aieng-workbench-smoke || true
