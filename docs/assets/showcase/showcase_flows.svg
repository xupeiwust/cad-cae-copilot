  <line x1="724" y1="272" x2="742" y2="272" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="746" y="258" width="70" height="28" fill="#3f1d38" rx="4" stroke="#f472b6" stroke-width="1"/>
  <text x="781" y="276" text-anchor="middle" fill="#fbcfe8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Rank</text>
  <line x1="816" y1="272" x2="834" y2="272" stroke="#64748b" stroke-width="1.5" marker-end="url(#a)"/>
  <rect x="470" y="294" width="70" height="28" fill="#3f1d38" rx="4" stroke="#f472b6" stroke-width="1"/>
  <text x="505" y="312" text-anchor="middle" fill="#fbcfe8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Accept</text>
  <text x="470" y="340" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Boundary: Static metrics; no autonomous optimizer; baseline never overwritten</text>
  <text x="470" y="356" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Artifacts: design_study_acceptance.json, accepted/candidate/...</text>
  <text x="470" y="372" fill="#94a3b8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="9">Cmd: pytest aieng-ui/backend/tests/test_design_study_demo.py -q</text>
